name: CI

# Run on every push to main and on every pull request targeting any branch.
# PRs are blocked from merging if any step fails (enforced via branch protection).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache the npm dependency tree between runs. On a warm cache this
          # saves ~30s — meaningful when the pipeline runs on every PR push.
          cache: 'npm'

      # npm ci uses the lockfile exactly, unlike npm install which may silently
      # upgrade packages. This guarantees reproducible builds across all environments.
      - run: npm ci

      # Steps are ordered cheapest-first so the pipeline fails fast:
      # lint catches syntax/logic issues before running the heavier test suite.
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  # EPIC23-T5: builds and publishes the backend's Docker image to GHCR, but
  # only after build-and-test passes and only on an actual merge to main —
  # never on a PR push, which would publish an image for code that hasn't
  # been reviewed/merged yet. GITHUB_TOKEN (auto-provided, no extra secret
  # to configure) is sufficient to push to this repo's own GHCR namespace as
  # long as the job explicitly requests `packages: write` below.
  docker-build-push:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image path; github.repository preserves
      # whatever case the org/repo name actually has, so this can't be
      # skipped just because this particular repo happens to be lowercase
      # already — a workflow that only works by coincidence isn't reusable.
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # Tags with both `latest` (always points at the newest main) and the
      # commit SHA (an immutable, always-available reference for rolling
      # back to a specific build — `latest` alone can't do that).
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
